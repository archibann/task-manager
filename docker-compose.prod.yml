services:
  db:
    image: postgres:16
    container_name: task_db
    restart: always
    environment:
      POSTGRES_USER: task_user
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: task_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: task_app
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://task_user:1234@db:5432/task_db
    expose: 
      - "8000"   # expose вместо ports для внутренней сети
    volumes:
      - .:/app

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
      - "8443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt/live/static-node.zapto.org/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/static-node.zapto.org/privkey.pem:/etc/ssl/certs/privkey.pem:ro

      
volumes:
  postgres_data: