server {
    listen 80;
    server_name _;

    # Редирект на HTTPS (если есть сертификаты), иначе можно закомментировать
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://app:8000;   # имя сервиса app из docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Пример для статики, если есть папка static в app/
    location /static/ {
        alias /app/app/static/;  # путь внутри контейнера
    }
}

